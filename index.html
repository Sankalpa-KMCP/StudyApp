<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      (function(l) {
        var search = l.search;
        if (search && search.indexOf('_p=') !== -1) {
          var params = {};
          var pairs = search.slice(1).split('&');
          var restOfQuery = [];
          for (var i = 0; i < pairs.length; i++) {
            var pair = pairs[i].split('=');
            var key = decodeURIComponent(pair[0]);
            var val = pair.slice(1).join('=').replace(/~and~/g, '&');
            if (key === '_p') {
              params._p = val;
            } else {
              restOfQuery.push(pair[0] + '=' + encodeURIComponent(val));
            }
          }
          if (params._p !== undefined) {
            var base = l.pathname;
            if (base.slice(-1) !== '/') {
              base += '/';
            }
            var newPath = base + params._p;
            newPath = newPath.replace(/\/+/g, '/');
            if (l.protocol !== 'file:') {
              var newSearch = restOfQuery.length > 0 ? ('?' + restOfQuery.join('&')) : '';
              window.history.replaceState(null, null, newPath + newSearch + l.hash);
            }
          }
        }
      }(window.location));
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f4f2ed" />
    <meta name="description" content="Local-first focus and study tracking dashboard" />
    <title>Study Dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
